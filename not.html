<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Test</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

<div class="bg-gray-800 p-8 rounded-2xl shadow-xl text-center max-w-md">

<h1 class="text-2xl font-bold mb-4">Android Notification Test</h1>

<p class="text-gray-300 mb-6">
Click the button and allow notifications.
</p>

<button id="notifyBtn"
class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-lg font-semibold transition">
Enable Notification
</button>

</div>

<script>

const btn = document.getElementById("notifyBtn");

btn.addEventListener("click", async () => {

  // ask permission
  const permission = await Notification.requestPermission();

  if(permission === "granted"){

    // wait 3 seconds
    setTimeout(() => {

      new Notification("Website Update", {
        body: "Please update your website features.",
        icon: "https://cdn-icons-png.flaticon.com/512/1827/1827349.png"
      });

    }, 3000);

  } else {
    alert("Notification permission denied");
  }

});

</script>

</body>
</html>
